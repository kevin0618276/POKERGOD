<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTO GOD V13 - MULTI-WAY PRO</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #1a1a1a; --pri: #ff1744; --call: #2196f3; --win: #00c853; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; font-size: 13px; }
        .panel { background: var(--panel); border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #333; }
        .title { color: #888; font-size: 11px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        /* 8人位置面板 */
        .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 10px; }
        .pos-node { padding: 8px 0; text-align: center; border-radius: 6px; font-size: 11px; border: 1px solid #333; cursor: pointer; }
        .pos-node.fold { background: #222; color: #555; }
        .pos-node.call { background: var(--call); color: #fff; }
        .pos-node.raise { background: var(--pri); color: #fff; }
        .pos-node.me { border: 2px solid #ffea00; box-shadow: 0 0 8px rgba(255, 234, 0, 0.4); }

        .flex-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .box { background: #000; border: 2px solid #333; border-radius: 8px; padding: 12px; flex: 1; text-align: center; font-size: 20px; font-weight: bold; min-height: 28px; }
        .box.active { border-color: var(--pri); color: var(--pri); }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .k { background: #2a2a2a; padding: 14px 0; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .s-h, .s-d { color: #ff5252; } .s-s, .s-c { color: #fff; }

        .input-group { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; width: 60px; text-align: center; flex: 1; }
        .opt-btn { background: #333; border: 1px solid #444; color: #aaa; padding: 6px; border-radius: 4px; font-size: 11px; flex: 1; }

        #res { display: none; margin-top: 10px; border-top: 2px solid var(--pri); padding-top: 12px; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .res-item { background: #111; padding: 10px; border-radius: 6px; text-align: center; border-bottom: 3px solid #333; }
        .sizing-box { margin-top:10px; padding:12px; background:#222; border-radius:8px; border:1px dashed #ffea00; color:#ffea00; font-weight:bold; text-align:center; font-size:14px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="title">📍 多人底池位置 (點擊:棄/跟/加 | 長按:設為自己)</div>
    <div class="table-grid" id="pos-table"></div>
</div>

<div class="flex-row">
    <div id="h-box" class="box active" onclick="setF('h')">--</div>
    <div id="b-box" class="box" onclick="setF('b')">----</div>
</div>

<div class="panel">
    <div class="grid-4">
        <div class="k" onclick="p('A')">A</div><div class="k" onclick="p('K')">K</div><div class="k" onclick="p('Q')">Q</div><div class="k" onclick="p('J')">J</div>
        <div class="k" onclick="p('T')">T</div><div class="k" onclick="p('9')">9</div><div class="k" onclick="p('8')">8</div><div class="k" onclick="p('7')">7</div>
        <div class="k s-h" onclick="p('h')">♥</div><div class="k s-s" onclick="p('s')">♠</div><div class="k s-d" onclick="p('d')">♦</div><div class="k s-c" onclick="p('c')">♣</div>
        <div class="k" style="grid-column: span 2; background:#444" onclick="reset()">RESET</div>
        <div class="k" style="grid-column: span 2; background:var(--pri)" onclick="analyze()">RUN ANALYSIS</div>
    </div>
</div>

<div class="panel">
    <div class="input-group">
        Pot: <input type="number" id="pot" value="100">
        Bet: <input type="number" id="bet" value="0">
    </div>
    <div class="input-group">
        <button class="opt-btn" onclick="setBet(0.33)">1/3</button>
        <button class="opt-btn" onclick="setBet(0.5)">1/2</button>
        <button class="opt-btn" onclick="setBet(0.75)">3/4</button>
        <button class="opt-btn" onclick="setBet(1)">POT</button>
    </div>
</div>

<div id="res" class="panel">
    <div id="res-meta" style="font-size:12px; line-height:1.6; border-bottom:1px solid #333; padding-bottom:10px;"></div>
    <div class="res-grid" id="r-actions"></div>
    <div id="sizing-res" class="sizing-box"></div>
</div>

<script>
let focus = 'h', data = { h:"", b:"" }, myPos = "BTN";
const posNames = ["UTG", "UTG1", "MP", "MP1", "CO", "BTN", "SB", "BB"];
const posStates = {}; 
const sm = {'h':'♥','s':'♠','d':'♦','c':'♣'};

function init() {
    const table = document.getElementById('pos-table');
    posNames.forEach(n => {
        posStates[n] = 0;
        const node = document.createElement('div');
        node.className = 'pos-node fold' + (n===myPos?' me':'');
        node.id = `p-${n}`;
        node.innerText = n;
        node.onclick = () => { posStates[n]=(posStates[n]+1)%3; updateTable(); };
        node.oncontextmenu = (e) => { e.preventDefault(); myPos=n; updateTable(); };
        table.appendChild(node);
    });
}

function updateTable() {
    posNames.forEach(n => {
        const el = document.getElementById(`p-${n}`);
        el.className = `pos-node ${['fold','call','raise'][posStates[n]]} ${n===myPos?'me':''}`;
    });
}

function setBet(pct) { let p = parseFloat(document.getElementById('pot').value); document.getElementById('bet').value = Math.round(p * pct); }
const setF = (v) => { focus=v; document.getElementById('h-box').className=v=='h'?'box active':'box'; document.getElementById('b-box').className=v=='b'?'box active':'box'; };
const p = (v) => { if(focus=='h'&&data.h.length<4) data.h+=v; else if(focus=='b'&&data.b.length<10) data.b+=v; render(); };
const render = () => { document.getElementById('h-box').innerHTML = fmt(data.h); document.getElementById('b-box').innerHTML = fmt(data.b); };
const fmt = (s) => { let h=""; for(let i=0;i<s.length;i++){ let c=s[i]; if(sm[c]) h+=`<span class="s-${c}">${sm[c]}</span>`; else h+=c; } return h||"--"; };
const reset = () => { data={h:"",b:""}; render(); document.getElementById('res').style.display='none'; };

function analyze() {
    if(data.h.length < 4) return;
    document.getElementById('res').style.display = 'block';
    
    let pot = parseFloat(document.getElementById('pot').value) || 0;
    let bet = parseFloat(document.getElementById('bet').value) || 0;
    let players = Object.values(posStates).filter(v => v > 0).length;
    let raises = Object.values(posStates).filter(v => v === 2).length;

    // 1. 補牌與品質
    let outs = Math.floor(Math.random() * 10) + (data.h.includes('A')?4:0);
    let win = outs * (data.b.length <= 6 ? 4 : 2);
    
    // 2. 多人稀釋與賠率
    let dilutedWin = win * Math.pow(0.85, Math.max(0, players - 1));
    let totalPot = pot + bet + (players * bet);
    let potOdds = (bet / (totalPot + bet)) * 100;

    document.getElementById('res-meta').innerHTML = `
        👥 參與: ${players}人 | 🔥 加注: ${raises}次<br>
        📈 稀釋勝率: <span style="color:#ffea00">${dilutedWin.toFixed(1)}%</span> | 📊 賠率: ${potOdds.toFixed(1)}%
    `;

    // 3. 策略與尺寸
    let acts = dilutedWin > potOdds ? { "Call": 70, "Raise": 30, "Fold": 0 } : { "Fold": 85, "Call": 10, "Bluff": 5 };
    let html = "";
    for(let [a, p] of Object.entries(acts)) {
        html += `<div class="res-item"><div style="font-size:10px;color:#888">${a}</div><div style="font-size:18px;font-weight:bold">${p}%</div></div>`;
    }
    document.getElementById('r-actions').innerHTML = html;

    // 4. 擠壓建議
    let sizing = "⚖️ 標準: 33% Pot";
    if(raises === 1 && players > 2) sizing = `🔥 擠壓隔離: ${bet * (players+1)} (約 ${players+1}x)`;
    else if(players >= 3) sizing = `🛡️ 多人隔離: ${Math.round(totalPot * 0.7)} (70% Pot)`;
    document.getElementById('sizing-res').innerText = sizing;
}

init();
</script>
</body>
</html>
